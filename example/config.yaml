server:
  port: 20080
  name: "example"
  mode: "release"
  read_timeout: 30s
  write_timeout: 30s
  shutdown_timeout: 10s
  # Trusted reverse-proxy CIDRs. Empty (default) trusts no proxy, so ClientIP()
  # is the socket peer and cannot be spoofed via X-Forwarded-For. Set this to
  # your LB/ingress ranges to honor forwarded client IPs (e.g. for rate limiting).
  # trusted_proxies:
  #   - "10.0.0.0/8"
  # Wait this long after marking the instance draining (/readyz -> 503) before
  # stopping the server, so load balancers drain it first. 0 disables it.
  # Recommended in Kubernetes rolling updates, e.g. 5s.
  # pre_shutdown_delay: 5s

health:
  # Expose the per-pillar breakdown (names/status/latency) on /healthz. Default
  # false returns only the aggregate status so unauthenticated callers cannot
  # enumerate backends. Enable only on internal/authenticated endpoints.
  show_details: false

log:
  level: "debug"
  format: "text"            # text (default) | json

i18n:
  default: "en"             # default language tag, e.g. "en", "zh-Hans"

auth:
  secret: "my-secret-key"
  issuer: "example-service"
  access_expire: 2h
  refresh_expire: 168h

databases:
  default:
    driver: "mysql"
    dsn: "root:password@tcp(127.0.0.1:3306)/mydb?charset=utf8mb4&parseTime=True&loc=Local"
    log_level: "info"
  # Example: additional read-only replica
  # readonly:
  #   driver: "mysql"
  #   dsn: "root:password@tcp(127.0.0.1:3307)/mydb?charset=utf8mb4&parseTime=True&loc=Local"
  #   max_open_conns: 100  # override default (50)
  #   max_idle_conns: 20   # override default (10)
  #   max_lifetime: 30m    # override default (1h)
  #   log_level: "warn"

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0

storages:
  default:
    driver: "cos"
    cos:
      bucket_url: "https://<bucket>-<appid>.cos.<region>.myqcloud.com"
      secret_id: ""
      secret_key: ""
      timeout: 30s
  # Example: additional storage provider
  # backup:
  #   driver: "s3"
  #   s3:
  #     endpoint: "https://s3.amazonaws.com"
  #     region: "us-east-1"
  #     bucket: "my-backup-bucket"
  #     access_key_id: ""
  #     secret_access_key: ""
  #     force_path_style: false

sms:
  default:
    driver: "tencentcloud"
    tencent:
      secret_id: ""
      secret_key: ""
      app_id: ""
      sign: ""
      region: "ap-guangzhou"

email:
  default:
    driver: "tencentcloud"
    tencent:
      secret_id: ""
      secret_key: ""
      from: ""
      region: "ap-hongkong"
  # Example: SMTP instance for verification codes
  # verify:
  #   driver: "smtp"
  #   smtp:
  #     host: "smtp.example.com"
  #     port: 465
  #     username: ""
  #     password: ""
  #     from: "verify@example.com"
  #     tls: true

telemetry:
  enabled: false                # master switch — false installs NoOp providers
  resource:
    environment: "development"  # deployment.environment.name
    # version: "1.2.3"          # service.version (usually injected via ldflags)
  otlp:
    enabled: true
    endpoint: "localhost:4318"  # OTel Collector default for OTLP/HTTP
    protocol: "http"            # http | grpc
    insecure: true              # set false + provide TLS headers in prod
    # headers:                  # optional auth headers
    #   authorization: "Bearer ..."
  prometheus:
    enabled: true
    path: "/metrics"            # mounted on the main gin engine
  traces:
    enabled: true
    sample_rate: 1.0            # 0 = never sample; 1 = always sample
  metrics:
    enabled: true
    runtime: true               # process.runtime.go.* (GC, heap, goroutines)
    http: true                  # auto HTTP RED middleware
    cardinality_limit: 2000     # per-instrument attribute-set cap
    exemplars: true             # link histogram buckets back to trace_ids

# Snowflake worker-ID allocation (optional; enable by registering the
# snowflake pillar). Leave worker_id unset to auto-allocate from Redis.
# snowflake:
#   # worker_id: 5            # static override; omit for Redis auto-allocation
#   redis:
#     addr: "127.0.0.1:6379"
#   ttl: 30s
#   renew_interval: 10s
#   safety_margin: 5s
#   fail_mode: safe           # safe (stop on lease loss) | besteffort

httpclient:
  timeout: 5s
  max_retries: 2
  retry_wait: 1s
  # Connection pool (optional; sane defaults shown). Tune when pointing many
  # concurrent requests at a single upstream host such as an internal LB domain.
  # max_idle_conns: 256
  # max_idle_conns_per_host: 64
  # max_conns_per_host: 0        # 0 = unlimited
  # idle_conn_timeout: 90s

# Inter-service communication: register upstream services by name.
# Each service inherits httpclient defaults unless overridden.
services:
  user-service:
    base_url: "http://localhost:8081/user-service"
  # order-service:
  #   base_url: "http://order-service:8080/order-service"
  #   timeout: 10s       # override global httpclient timeout
  #   max_retries: 3     # override global httpclient retries

middleware:
  cors:
    allow_origins:
      - "*"
    allow_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "PATCH"
      - "OPTIONS"
    allow_headers:
      - "Origin"
      - "Content-Type"
      - "Authorization"
      - "X-Request-ID"
    max_age: 86400
  rate_limit:
    rate: 100
    window: 1m
